apiVersion: apps/v1
kind: Deployment
metadata:
  name: studyops-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: studyops-backend
  template:
    metadata:
      labels:
        app: studyops-backend
    spec:
      containers:
        - name: studyops-backend
          image: 029458826892.dkr.ecr.ap-south-1.amazonaws.com/studyops-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: studyops-secrets
            - configMapRef:
                name: studyops-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20